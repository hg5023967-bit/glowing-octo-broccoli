<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relative Position Example</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
 

    <div class="box">Moved Box</div>

    <p>
        The box is moved 40px to the right and 20px down using
        relative positioning.
    </p>

     
    <div class="container">
        <div class="box1">Box 1</div>
        <div class="box2">Box 2</div>
    </div>

    <p>
        Box 1 is moved using relative positioning. Box 2 stays in its
        original position because relative positioning does not remove
        the element from the normal document flow.
    </p>

</body>
</html>
