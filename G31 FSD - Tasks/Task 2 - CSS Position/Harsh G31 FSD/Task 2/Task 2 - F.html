<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-Index Example</title>
    <link rel="stylesheet" href="style6.css">
</head>
<body>

    <h2>Z-Index Demonstration</h2>

   
    <div class="container">
        <div class="box red-box">Red Box</div>
        <div class="box blue-box">Blue Box</div>
        <div class="box green-box">Green Box</div>
    </div>

    <h3>Explanation</h3>
    <p>
        The blue box is placed above the red box using a higher z-index.
        The green box has the highest z-index, so it appears above both boxes.
    </p>

</body>
</html>
